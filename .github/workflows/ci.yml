name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  standard-library-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: puncture_test
          POSTGRES_PASSWORD: puncture_test
          POSTGRES_DB: puncture_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U puncture_test -d puncture_agent_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install production runtime dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          httpx==0.28.1
          'langgraph==1.2.9'
          'langgraph-checkpoint-postgres==3.1.0'
          'psycopg[binary]>=3.2,<4'
      - name: Verify production runtime imports
        env:
          PYTHONPATH: .:src
        run: >-
          python -c
          "from puncture_agent.agent import langgraph_available;
          from langgraph.checkpoint.postgres import PostgresSaver;
          assert langgraph_available()"
      - name: Compile
        run: python -m compileall -q contracts src tests benchmarks examples deploy/qwen-vllm/scripts deploy/rag-search/scripts
      - name: Validate deployment shell
        run: |
          bash -n deploy/qwen-vllm/entrypoint.sh
          bash -n deploy/rag-search/entrypoint.sh
          bash -n deploy/rag-search/scripts/container_healthcheck.sh
      - name: Test
        run: python run_tests.py
      - name: PostgreSQL/LangGraph integration (skips forbidden)
        if: ${{ always() }}
        env:
          PUNCTURE_TEST_POSTGRES_DSN: postgresql://puncture_test:puncture_test@127.0.0.1:5432/puncture_agent_test?sslmode=disable
        run: >-
          python -c
          "import sys, unittest;
          suite = unittest.defaultTestLoader.loadTestsFromName('tests.graph.test_langgraph_postgres');
          result = unittest.TextTestRunner(verbosity=2).run(suite);
          sys.exit(0 if result.wasSuccessful() and not result.skipped else 1)"

  postgres-restart-recovery:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: puncture_test
          POSTGRES_PASSWORD: puncture_test
          POSTGRES_DB: puncture_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U puncture_test -d puncture_agent_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install production runtime dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          httpx==0.28.1
          'langgraph==1.2.9'
          'langgraph-checkpoint-postgres==3.1.0'
          'psycopg[binary]>=3.2,<4'
      - name: Prepare interrupted checkpoint in process A
        env:
          PUNCTURE_TEST_POSTGRES_DSN: postgresql://puncture_test:puncture_test@127.0.0.1:5432/puncture_agent_test?sslmode=disable
          PUNCTURE_POSTGRES_RESTART_EVIDENCE_DIR: ${{ runner.temp }}/puncture-postgres-restart-evidence
        run: python -m tests.graph.postgres_service_restart_probe prepare
      - name: Restart the PostgreSQL 16 service container
        env:
          POSTGRES_CONTAINER_ID: ${{ job.services.postgres.id }}
        run: |
          set -Eeuo pipefail
          test -n "${POSTGRES_CONTAINER_ID}"
          docker restart --time 10 "${POSTGRES_CONTAINER_ID}"
          for attempt in $(seq 1 60); do
            status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${POSTGRES_CONTAINER_ID}")"
            if test "${status}" = "healthy"; then
              exit 0
            fi
            sleep 1
          done
          docker inspect "${POSTGRES_CONTAINER_ID}"
          docker logs "${POSTGRES_CONTAINER_ID}"
          exit 1
      - name: Recover checkpoint in process B
        env:
          PUNCTURE_TEST_POSTGRES_DSN: postgresql://puncture_test:puncture_test@127.0.0.1:5432/puncture_agent_test?sslmode=disable
          PUNCTURE_POSTGRES_RESTART_EVIDENCE_DIR: ${{ runner.temp }}/puncture-postgres-restart-evidence
        run: python -m tests.graph.postgres_service_restart_probe recover
      - name: Upload PostgreSQL restart evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: postgres-restart-recovery-${{ github.sha }}
          path: ${{ runner.temp }}/puncture-postgres-restart-evidence
          if-no-files-found: error
          retention-days: 30

  postgres-checkpoint-benchmark:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: puncture_test
          POSTGRES_PASSWORD: puncture_test
          POSTGRES_DB: puncture_agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U puncture_test -d puncture_agent_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install production runtime dependencies
        run: >-
          python -m pip install --disable-pip-version-check
          httpx==0.28.1
          'langgraph==1.2.9'
          'langgraph-checkpoint-postgres==3.1.0'
          'psycopg[binary]>=3.2,<4'
          'jsonschema==4.26.0'
      - name: Measure PostgreSQL checkpoint save and resume
        env:
          PUNCTURE_TEST_POSTGRES_DSN: postgresql://puncture_test:puncture_test@127.0.0.1:5432/puncture_agent_test?sslmode=disable
        run: >-
          python benchmarks/langgraph_postgres_checkpoint_benchmark.py
          --warmups 5
          --rounds 3
          --samples-per-round 50
          --environment-label github-actions-ubuntu-24.04
          --storage-label gha-postgres16-ephemeral-service
          --output "${RUNNER_TEMP}/langgraph-postgres-checkpoint.json"
      - name: Validate PostgreSQL checkpoint benchmark schema
        run: >-
          python -c
          "import json, jsonschema, os, pathlib;
          root = pathlib.Path('.');
          schema = json.loads((root / 'benchmarks/schemas/langgraph-postgres-checkpoint-v1.schema.json').read_text());
          result = json.loads((pathlib.Path(os.environ['RUNNER_TEMP']) / 'langgraph-postgres-checkpoint.json').read_text());
          jsonschema.Draft202012Validator.check_schema(schema);
          jsonschema.Draft202012Validator(schema).validate(result)"
      - name: Upload PostgreSQL checkpoint benchmark
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: postgres-checkpoint-benchmark-${{ github.sha }}
          path: ${{ runner.temp }}/langgraph-postgres-checkpoint.json
          if-no-files-found: error
          retention-days: 30

  release-tag:
    needs:
      - standard-library-tests
      - postgres-restart-recovery
      - postgres-checkpoint-benchmark
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      startsWith(github.event.head_commit.message, 'release: v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate release marker and publish annotated tag
        shell: bash
        run: |
          set -Eeuo pipefail
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml | head -n 1)"
          tag="v${version}"
          subject="$(git log -1 --pretty=%s)"
          test "$subject" = "release: ${tag}"
          test -f "docs/releases/${tag}.md"
          if git ls-remote --exit-code origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "${tag} already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "${tag}: CI-verified module release"
          git push origin "refs/tags/${tag}"
