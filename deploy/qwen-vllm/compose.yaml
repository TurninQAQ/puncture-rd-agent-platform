name: puncture-qwen-vllm

services:
  qwen-vllm:
    profiles: ["serve"]
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.25.0}
    restart: unless-stopped
    entrypoint: ["/opt/qwen-deployment/entrypoint.sh"]
    ports:
      - "${VLLM_PUBLISH_ADDRESS:-127.0.0.1}:${VLLM_HOST_PORT:-8000}:${VLLM_CONTAINER_PORT:-8000}"
    environment:
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      HF_HOME: /models/huggingface
      HF_TOKEN_FILE: /run/secrets/hf_token
      VLLM_MODEL_ID: ${VLLM_MODEL_ID:-Qwen/Qwen3-8B}
      VLLM_MODEL_REVISION: ${VLLM_MODEL_REVISION:-main}
      VLLM_SERVED_MODEL_NAME: ${VLLM_SERVED_MODEL_NAME:-qwen-enterprise-agent}
      VLLM_CONTAINER_PORT: ${VLLM_CONTAINER_PORT:-8000}
      VLLM_TENSOR_PARALLEL_SIZE: ${VLLM_TENSOR_PARALLEL_SIZE:-1}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-8192}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.90}
      VLLM_MAX_NUM_SEQS: ${VLLM_MAX_NUM_SEQS:-16}
      VLLM_MAX_NUM_BATCHED_TOKENS: ${VLLM_MAX_NUM_BATCHED_TOKENS:-}
      VLLM_SWAP_SPACE_GB: ${VLLM_SWAP_SPACE_GB:-4}
      VLLM_CPU_OFFLOAD_GB: ${VLLM_CPU_OFFLOAD_GB:-0}
      VLLM_DTYPE: ${VLLM_DTYPE:-auto}
      VLLM_KV_CACHE_DTYPE: ${VLLM_KV_CACHE_DTYPE:-auto}
      VLLM_QUANTIZATION: ${VLLM_QUANTIZATION:-}
      VLLM_LOAD_FORMAT: ${VLLM_LOAD_FORMAT:-auto}
      VLLM_GENERATION_CONFIG: ${VLLM_GENERATION_CONFIG:-vllm}
      VLLM_TRUST_REMOTE_CODE: ${VLLM_TRUST_REMOTE_CODE:-false}
      VLLM_ENFORCE_EAGER: ${VLLM_ENFORCE_EAGER:-false}
      VLLM_ENABLE_PREFIX_CACHING: ${VLLM_ENABLE_PREFIX_CACHING:-true}
      VLLM_ENABLE_CHUNKED_PREFILL: ${VLLM_ENABLE_CHUNKED_PREFILL:-true}
      VLLM_ENABLE_AUTO_TOOL_CHOICE: ${VLLM_ENABLE_AUTO_TOOL_CHOICE:-true}
      VLLM_TOOL_CALL_PARSER: ${VLLM_TOOL_CALL_PARSER:-hermes}
      VLLM_TOOL_PARSER_PLUGIN: ${VLLM_TOOL_PARSER_PLUGIN:-}
      VLLM_CHAT_TEMPLATE_PATH: ${VLLM_CHAT_TEMPLATE_PATH:-}
      VLLM_REASONING_PARSER: ${VLLM_REASONING_PARSER:-}
      VLLM_ENABLE_REASONING_LEGACY_FLAG: ${VLLM_ENABLE_REASONING_LEGACY_FLAG:-false}
      VLLM_STRUCTURED_OUTPUT_FLAG_STYLE: ${VLLM_STRUCTURED_OUTPUT_FLAG_STYLE:-none}
      VLLM_STRUCTURED_OUTPUT_BACKEND: ${VLLM_STRUCTURED_OUTPUT_BACKEND:-}
      VLLM_STRUCTURED_OUTPUT_ENABLE_IN_REASONING: ${VLLM_STRUCTURED_OUTPUT_ENABLE_IN_REASONING:-false}
      VLLM_DISABLE_LOG_REQUESTS: ${VLLM_DISABLE_LOG_REQUESTS:-true}
      VLLM_UVICORN_LOG_LEVEL: ${VLLM_UVICORN_LOG_LEVEL:-info}
      VLLM_API_KEY_FILE: /run/secrets/vllm_api_key
    volumes:
      - ${VLLM_MODEL_CACHE:-./model-cache}:/models/huggingface
      - ./entrypoint.sh:/opt/qwen-deployment/entrypoint.sh:ro
      - ./scripts:/opt/qwen-deployment/scripts:ro
      - ${VLLM_API_KEY_FILE_HOST:-/dev/null}:/run/secrets/vllm_api_key:ro
      - ${HF_TOKEN_FILE_HOST:-/dev/null}:/run/secrets/hf_token:ro
    shm_size: ${VLLM_SHM_SIZE:-16gb}
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python3", "/opt/qwen-deployment/scripts/health_check.py", "--once"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]

  smoke-test:
    profiles: ["verify"]
    image: python:3.12-slim
    depends_on:
      qwen-vllm:
        condition: service_healthy
    environment:
      VLLM_BASE_URL: ${VERIFY_BASE_URL:-http://qwen-vllm:8000/v1}
      VLLM_MODEL: ${VLLM_SERVED_MODEL_NAME:-qwen-enterprise-agent}
      VLLM_API_KEY_FILE: /run/secrets/vllm_api_key
      VERIFY_TIMEOUT_SECONDS: ${VERIFY_TIMEOUT_SECONDS:-120}
    volumes:
      - ./scripts:/opt/qwen-deployment/scripts:ro
      - ${VLLM_API_KEY_FILE_HOST:-/dev/null}:/run/secrets/vllm_api_key:ro
    command: ["python3", "/opt/qwen-deployment/scripts/smoke_test.py"]
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  benchmark:
    profiles: ["benchmark"]
    image: python:3.12-slim
    depends_on:
      qwen-vllm:
        condition: service_healthy
    environment:
      VLLM_BASE_URL: ${VERIFY_BASE_URL:-http://qwen-vllm:8000/v1}
      VLLM_MODEL: ${VLLM_SERVED_MODEL_NAME:-qwen-enterprise-agent}
      VLLM_API_KEY_FILE: /run/secrets/vllm_api_key
      BENCHMARK_REQUESTS: ${BENCHMARK_REQUESTS:-20}
      BENCHMARK_CONCURRENCY: ${BENCHMARK_CONCURRENCY:-1}
      BENCHMARK_MAX_TOKENS: ${BENCHMARK_MAX_TOKENS:-128}
      BENCHMARK_STREAM: ${BENCHMARK_STREAM:-true}
    volumes:
      - ./scripts:/opt/qwen-deployment/scripts:ro
      - ./benchmark-results:/results
      - ${VLLM_API_KEY_FILE_HOST:-/dev/null}:/run/secrets/vllm_api_key:ro
    command:
      - python3
      - /opt/qwen-deployment/scripts/benchmark.py
      - --output
      - /results/latest.json
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
